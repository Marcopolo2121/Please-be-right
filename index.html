  #status-bar { display: flex; align-items: center; gap: 8px; font-size: 0.75rem; color: #a0c4ff; }
  #status-dot { width: 8px; height: 8px; border-radius: 50%; background: #4cc9a0; display: inline-block; }
  #status-dot.loading { background: #f4a261; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
  .main { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }
  .search-card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 24px; }

  #searchInput { width: 100%; padding: 13px 44px 13px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1rem; outline: none; transition: border-color 0.2s; background: #fafafa; }
  #searchInput:focus { border-color: #0f3460; background: white; }
  #searchInput::placeholder { color: #bbb; }
  #clearBtn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #aaa; font-size: 1.1rem; display: none; padding: 4px; line-height: 1; }
  #clearBtn:hover { color: #555; }
  #acList { position: absolute; top: calc(100% + 2px); left: 0; right: 0; z-index: 100; background: white; border: 2px solid #0f3460; border-radius: 8px; max-height: 280px; overflow-y: auto; box-shadow: 0 6px 20px rgba(0,0,0,0.13); display: none; }
  .ac-item { padding: 10px 16px; cursor: pointer; font-size: 0.875rem; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; transition: background 0.1s; }
  .ac-item:last-child { border-bottom: none; }
  .ac-item:hover, .ac-item.active { background: #f0f4ff; }
  .ac-name { flex: 1; }
  .ac-meta { font-size: 0.7rem; color: #999; margin-left: 10px; display: flex; gap: 5px; flex-shrink: 0; }
  .ac-sheet { background: #e8f4fd; color: #0c5280; border-radius: 4px; padding: 1px 6px; }
  .badge-a { background: #d4edda; color: #155724; border-radius: 4px; padding: 1px 6px; font-size: 0.68rem; }
  .badge-i { background: #f8d7da; color: #721c24; border-radius: 4px; padding: 1px 6px; font-size: 0.68rem; }
  .badge-c { background: #fff3cd; color: #856404; border-radius: 4px; padding: 1px 6px; font-size: 0.68rem; }
  .ac-highlight { font-weight: 700; color: #0f3460; }
  .hint { font-size: 0.78rem; color: #999; margin-top: 8px; }
  .profile-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }
  .section-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
  .section-header { padding: 14px 18px; font-weight: 700; font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.6px; color: white; }
  .field-row { display: flex; padding: 9px 18px; border-bottom: 1px solid #f5f5f5; align-items: flex-start; gap: 10px; }
  .field-row:last-child { border-bottom: none; }
  .field-label { font-size: 0.75rem; color: #888; min-width: 140px; font-weight: 500; flex-shrink: 0; padding-top: 1px; }
  .field-value { font-size: 0.875rem; color: #1a1a2e; font-weight: 500; flex: 1; word-break: break-word; white-space: pre-wrap; }
  .field-value.empty { color: #ccc; font-style: italic; font-weight: 400; }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
  .badge.active { background: #d4edda; color: #155724; }
  .badge.inactive { background: #f8d7da; color: #721c24; }
  .badge.neutral { background: #e8f4fd; color: #0c5280; margin: 2px; }
  .sheet-pill { display: inline-block; background: rgba(255,255,255,0.2); border-radius: 6px; font-size: 0.7rem; padding: 2px 7px; margin-left: 6px; }
  .hdr-account  { background: linear-gradient(90deg,#0f3460,#1a5276); }
  .hdr-contact  { background: linear-gradient(90deg,#1a6b4a,#27ae60); }
  .hdr-notes    { background: linear-gradient(90deg,#7a5c00,#c8a217); }
  .hdr-contract { background: linear-gradient(90deg,#7d3c98,#9b59b6); }
  .hdr-memory   { background: linear-gradient(90deg,#c0392b,#e74c3c); }
  .hdr-alu      { background: linear-gradient(90deg,#d35400,#e67e22); }
  .hdr-ocean    { background: linear-gradient(90deg,#2980b9,#3498db); }
  .notes-body { padding: 14px 18px; font-size: 0.875rem; color: #1a1a2e; white-space: pre-wrap; word-break: break-word; line-height: 1.6; }
  .notes-body.empty { color: #bbb; font-style: italic; }
  .empty-state { text-align: center; padding: 60px 20px; color: #bbb; grid-column: 1/-1; }
  .empty-state .icon { font-size: 3rem; margin-bottom: 14px; }
  .not-found { grid-column:1/-1; text-align:center; padding:50px 20px; color:#888; }
</style>

    CUSTOMERS.length=0;

  } catch(e) { console.error('rebuildCustomers error:', e); }
}
rebuildCustomers();

const searchInput = document.getElementById('searchInput');
const acList = document.getElementById('acList');
const clearBtn = document.getElementById('clearBtn');
const grid = document.getElementById('profileGrid');
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const hintEl = document.getElementById('hintEl');
let activeIdx = -1;
let refreshCountdown = 60;

function sCls(s){const l=(s||'').toLowerCase();return l==='active'?'badge-a':l.includes('inactive')?'badge-i':'badge-c';}
function sLbl(s){return s||'';}

function showSuggestions(q){
  acList.innerHTML=''; activeIdx=-1;
  if(!q){acList.style.display='none';return;}
  const ql=q.toLowerCase();
  const matches=CUSTOMERS.filter(c=>c.n&&c.n.toLowerCase().includes(ql))
    .sort((a,b)=>{const as=a.n.toLowerCase().startsWith(ql),bs=b.n.toLowerCase().startsWith(ql);return as===bs?a.n.localeCompare(b.n):as?-1:1;})
    .slice(0,25);
  if(!matches.length){acList.style.display='none';return;}
  matches.forEach(c=>{
    const idx=c.n.toLowerCase().indexOf(ql);
    const hl=c.n.slice(0,idx)+`<span class="ac-highlight">${c.n.slice(idx,idx+q.length)}</span>`+c.n.slice(idx+q.length);
    const div=document.createElement('div');div.className='ac-item';
    div.innerHTML=`<span class="ac-name">${hl}</span><span class="ac-meta"><span class="ac-sheet">${c.sh}</span>${c.s?`<span class="${sCls(c.s)}">${sLbl(c.s)}</span>`:''}</span>`;
    div.addEventListener('mousedown',e=>{e.preventDefault();selectCustomer(c.n);});
    acList.appendChild(div);
  });
  acList.style.display='block';
}

function selectCustomer(name){
  searchInput.value=name; clearBtn.style.display='block'; acList.style.display='none';
  renderProfile(name);
}

function clearSearch(){
  searchInput.value=''; clearBtn.style.display='none'; acList.style.display='none';
  grid.innerHTML=`<div class="empty-state"><div class="icon">👆</div><p>Start typing a customer name to see suggestions</p></div>`;
  statusText.textContent='Ready'; searchInput.focus();
}

searchInput.addEventListener('input',()=>{
  clearBtn.style.display=searchInput.value?'block':'none';
  showSuggestions(searchInput.value);
});
searchInput.addEventListener('keydown',e=>{
  const items=acList.querySelectorAll('.ac-item');
  if(e.key==='ArrowDown'){e.preventDefault();activeIdx=Math.min(activeIdx+1,items.length-1);items.forEach((el,i)=>el.classList.toggle('active',i===activeIdx));items[activeIdx]?.scrollIntoView({block:'nearest'});}
  else if(e.key==='ArrowUp'){e.preventDefault();activeIdx=Math.max(activeIdx-1,0);items.forEach((el,i)=>el.classList.toggle('active',i===activeIdx));items[activeIdx]?.scrollIntoView({block:'nearest'});}
  else if(e.key==='Enter'){
    const ql=searchInput.value.toLowerCase();
    const vis=CUSTOMERS.filter(c=>c.n&&c.n.toLowerCase().includes(ql)).sort((a,b)=>{const as=a.n.toLowerCase().startsWith(ql),bs=b.n.toLowerCase().startsWith(ql);return as===bs?a.n.localeCompare(b.n):as?-1:1;});
    const pick=activeIdx>=0?vis[activeIdx]:vis[0];
    if(pick)selectCustomer(pick.n);
  }
  else if(e.key==='Escape')acList.style.display='none';
});
searchInput.addEventListener('blur',()=>setTimeout(()=>acList.style.display='none',150));
searchInput.addEventListener('focus',()=>{if(searchInput.value)showSuggestions(searchInput.value);});
clearBtn.addEventListener('click',clearSearch);

function fRow(label,val){
  const empty=!val||String(val).trim()===''||val==='null';
  return empty
    ?`<div class="field-row"><span class="field-label">${label}</span><span class="field-value empty">—</span></div>`
    :`<div class="field-row"><span class="field-label">${label}</span><span class="field-value">${String(val).replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span></div>`;
}
function sBadge(val){
  if(!val||val==='null')return fRow('Status',null);
  const cls=val.toLowerCase()==='active'?'active':'inactive';
  return `<div class="field-row"><span class="field-label">Status</span><span class="badge ${cls}">${val}</span></div>`;
}

function renderProfile(name){

        ${fRow('Sales Representative',d['Sales Representative'])}
        ${fRow('SalesOps',d['SalesOps'])}
        ${fRow('Input Method Oracle',d['Input Method Oracle'])}
        ${fRow('OneTouch Email',d['OneTouch email'])}
      </div>
    </div>
    <div class="section-card" style="grid-column:1/-1">
      <div class="section-header hdr-notes">📝 Notes</div>
      <div class="notes-body${notes?'':' empty'}">${notes||'No notes recorded for this customer.'}</div>
    </div>
    <div class="section-card">
      <div class="section-header hdr-contract">📄 Contract & General Terms</div>
      <div class="section-body">
        ${fRow('Contract',d['Contract'])}${fRow('Contract Inco Terms',d['Contract Inco Terms'])}
        ${fRow('Contract - PO Overrides',d['Contract - PO overrides Terms'])}
        ${fRow('Payment Terms ALU/TAC',d['Payment Terms ALU / TAC Incoterm Sheet']||d['Payment Terms ALM / TAC Incoterm Sheet'])}
        ${fRow('Payment Terms Ocean',d['Payment Terms Ocean Incoterm Sheet']||d['Container Only Payment Terms'])}
        ${fRow('NDA',d['NDA'])}
      </div>
    </div>
    <div class="section-card">
      <div class="section-header hdr-memory">💾 Memory</div>
      <div class="section-body">
        ${fRow('ALU/ALM & TAC Inco Terms',d['Memory - ALU & TAC Inco Terms']||d['Memory - ALM & TAC Inco Terms'])}
        ${fRow('Payment Terms',d['Payment Terms Memory'])}
        ${fRow('MOQ Exempt',d['Memory - MOQ exempt'])}
        ${fRow('Pricelist Oracle',d['Memory - Pricelist Oracle']||d['Memory & CorsairOne - Pricelist Oracle'])}
        ${fRow('Ship Method TAC',d['Memory -     Ship-Method TAC']||d['Memory - Ship-Method TAC']||d['Memory & CorsairOne - Ship-Method TAC'])}
        ${fRow('Ship Method ALU',d['Memory -        Ship-Method ALU']||d['Memory - ShipSet TAC'])}
      </div>
    </div>
    <div class="section-card">
      <div class="section-header hdr-alu">📦 ALU / ALM (Non-Ocean)</div>
      <div class="section-body">
        ${fRow('Min Value',d['Min Value ALU']||d['Min Value']||d['Min Ship Value'])}
        ${fRow('Inco Terms',d['NON Ocean ALU Inco Terms']||d['NON Ocean ALM Inco Terms'])}
        ${fRow('Payment Terms',d['Payment Terms ALU']||d['Payment Terms ALM'])}
        ${fRow('Pricelist Components',d['NON Ocean ALU Oracle Pricelist Components']||d['NON Ocean ALM Oracle Pricelist Components'])}
        ${fRow('Pricelist HID',d['NON Ocean ALU Oracle Pricelist HID']||d['NON Ocean ALM Oracle Pricelist HID']||d['NON Ocean ALU Oracle Pricelist local Currency'])}
        ${fRow('Ship Method',d['NON Ocean ALU Ship-Method']||d['NON Ocean ALM Ship-Method'])}
      </div>
    </div>
    <div class="section-card">
      <div class="section-header hdr-ocean">🚢 Ocean (QWC / VEC)</div>
      <div class="section-body">
        ${fRow('Inco Terms',d['Ocean  - QWC or VEC Inco Terms']||d['Ocean Container - QWC or VEC Inco Terms'])}
        ${fRow('Payment Terms',d['Payment Terms Ocean'])}
        ${fRow('Tax Code',d['Ocean  - QWC or VEC Tax Code'])}
        ${fRow('CMS File',d['Ocean  - QWC or VEC CMS File']||d['Ocean Container - QWC or VEC CMS File'])}
        ${fRow('Pricelist Chairs',d['Ocean - VEC Oracle Pricelist Chairs']||d['Ocean Container - VEC Oracle Pricelist Chairs'])}
        ${fRow('Pricelist Container',d['Ocean  - QWC or VEC Oracle Pricelist Container']||d['Ocean Container - QWC or VEC Oracle Pricelist'])}
        ${fRow('Ship Method',d['Ocean  - QWC or VEC Ship Method']||d['Ocean Container - QWC or VEC Ship Method'])}
      </div>
    </div>`;
}

  {id:'2238986157614980',name:'B2B'},{id:'8502359983712132',name:'Benelux'},

const REFRESH_INTERVAL=30;
let refreshSecs=REFRESH_INTERVAL;

setInterval(()=>{
  refreshSecs--;
  const m=Math.floor(refreshSecs/60), s=refreshSecs%60;
  hintEl.textContent=`All data pre-loaded — instant search. Next refresh in ${m}:${String(s).padStart(2,'0')}.`;
  if(refreshSecs<=0){ refreshSecs=REFRESH_INTERVAL; silentRefresh(); }
},1000);

async function silentRefresh(){
  hintEl.textContent='Refreshing live data from Smartsheet...';
  try{
    const resp = await fetch('/.netlify/functions/refresh');
    if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const result = await resp.json();
    if(result.error) throw new Error(result.error);
    const fresh = result.customers || {};
    if(result.errors && result.errors.length) console.warn('Sheet errors:', result.errors);
    // Replace DB entries with fresh data from Smartsheet
    Object.entries(fresh).forEach(([name,row])=>{
      if(name&&name.trim()) DB[name]=row;
    });
    rebuildCustomers();
    // Always re-render current profile so live data shows immediately
    const cur=searchInput.value.trim();
    if(cur&&DB[cur]) renderProfile(cur);
    const now=new Date();
    hintEl.textContent=`Live data — last refreshed: ${now.toLocaleTimeString('en-GB')}. Next in 0:30.`;
  }catch(e){
    hintEl.textContent=`All data pre-loaded — instant search. Refresh failed: ${e.message}. Retrying in 0:30.`;
  }
  refreshSecs=REFRESH_INTERVAL;
}

setInterval(()=>{
  refreshCountdown--;
  const m=Math.floor(refreshCountdown/60), s=refreshCountdown%60;
  hintEl.textContent=`All data pre-loaded — instant search. Next refresh in ${m}:${String(s).padStart(2,'0')}.`;
  if(refreshCountdown<=0){ refreshCountdown=REFRESH_INTERVAL; silentRefresh(); }
},1000);

async function silentRefresh(){
  hintEl.textContent='Refreshing live data from Smartsheet...';
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:16000,
        mcp_servers:[{type:'url',url:'https://mcp.smartsheet.com',name:'smartsheet',authorization_token:SMARTSHEET_TOKEN}],
        messages:[{role:'user',content:`You are a data relay. Fetch all rows with a non-empty "Oracle Customer Name" from these 12 Smartsheet sheets using Bearer token: ${SMARTSHEET_TOKEN}. For each sheet call: GET https://api.smartsheet.com/2.0/sheets/{sheetId}?include=objectValue. Sheet IDs: ${SHEET_IDS.map(s=>`${s.id} (${s.name})`).join(', ')}. For every cell use displayValue if available, otherwise value. Skip rows where Oracle Customer Name is empty. Return ONLY a raw JSON object, no markdown: {"Customer Name":{"_sheet":"SheetName","Oracle Customer Name":"...","Notes":"...",...all columns...}}`}]
      })
    });
    if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data=await resp.json();
    const raw=data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
    const match=raw.match(/\{[\s\S]*\}/);
    if(!match) throw new Error('No data returned');
    const fresh=JSON.parse(match[0]);
    let changes=0;
    Object.entries(fresh).forEach(([name,row])=>{
      if(!name||!name.trim()) return;
      if(!DB[name]||JSON.stringify(DB[name])!==JSON.stringify(row)) changes++;
      DB[name]=row;
    });
    rebuildCustomers();
    const cur=searchInput.value.trim();
    if(cur&&DB[cur]&&changes>0) renderProfile(cur);
    const now=new Date();
    hintEl.textContent=`All data pre-loaded — instant search. Last refreshed: ${now.toLocaleTimeString('en-GB')}${changes?` · ${changes} update${changes>1?'s':''}`:' · no changes'}. Next in 5:00.`;
  }catch(e){
    hintEl.textContent=`All data pre-loaded — instant search. Refresh failed: ${e.message}. Retrying in 5:00.`;
  }
  refreshCountdown=REFRESH_INTERVAL;
}
